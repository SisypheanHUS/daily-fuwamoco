name: daily_ruffian
description: "Daily Ruffian — a FUWAMOCO-fan morning companion app."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  just_audio: ^0.10.6
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/greetings/default/
    - assets/quotes/quotes.json
    - assets/wallpapers/manifest.json
    - assets/schedule/schedule.json
    - assets/prompts/looking_forward_chips.json
    - assets/collection/manifest.json
    - assets/fanart/

  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Variable.ttf
